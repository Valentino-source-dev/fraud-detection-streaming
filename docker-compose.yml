services:
  # ────────────────────────────────────────────────
  # 1. Redpanda  (Kafka-compatible, zero-JVM)
  # ────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - "redpanda"
      - "start"
      - "--smp"
      - "1"
      - "--memory"
      - "512M"
      - "--overprovisioned"
      - "--kafka-addr"
      - "internal://0.0.0.0:9092,external://0.0.0.0:19092"
      - "--advertise-kafka-addr"
      - "internal://redpanda:9092,external://localhost:19092"
      - "--pandaproxy-addr"
      - "internal://0.0.0.0:8082,external://0.0.0.0:18082"
      - "--advertise-pandaproxy-addr"
      - "internal://redpanda:8082,external://localhost:18082"
      - "--schema-registry-addr"
      - "internal://0.0.0.0:8081,external://0.0.0.0:18081"
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # Pandaproxy (REST)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://redpanda:8081
    depends_on:
      redpanda:
        condition: service_healthy

  # ────────────────────────────────────────────────
  # 2. Transaction Generator  (CSV → Kafka)
  # ────────────────────────────────────────────────
  transaction-generator:
    build:
      context: ./generator
    environment:
      KAFKA_BROKER: redpanda:9092
      KAFKA_TOPIC: transactions
      REPLAY_SPEED: ${REPLAY_SPEED:-10}
      BATCH_SIZE: ${BATCH_SIZE:-32}
      DATA_PATH: /data/creditcard.csv
    volumes:
      - ./data:/data:ro
    depends_on:
      redpanda:
        condition: service_healthy
    restart: on-failure

  # ────────────────────────────────────────────────
  # 3. Stream Consumer  (Feature eng + Inference)
  # ────────────────────────────────────────────────
  stream-consumer:
    build:
      context: ./consumer
    ports:
      - "8000:8000"     # Prometheus metrics
    environment:
      KAFKA_BROKER: redpanda:9092
      KAFKA_TOPIC: transactions
      CONSUMER_GROUP: fraud-detector
      SCORE_THRESHOLD: ${SCORE_THRESHOLD:-0.5}
      METRICS_PORT: "8000"
      MODEL_CHECK_INTERVAL_SEC: "300"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_secret_change_me}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: fraud-detector
      MLFLOW_MODEL_STAGE: Production
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: on-failure

  # ────────────────────────────────────────────────
  # 4. PostgreSQL  (prediction storage)
  # ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fraud_detection
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud_detection"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────────
  # 5. MLflow  (experiment tracking + model registry)
  # ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    ports:
      - "5000:5000"
    environment:
      BACKEND_STORE_URI: postgresql://fraud:${POSTGRES_PASSWORD:-fraud_secret_change_me}@postgres:5432/fraud_detection
      ARTIFACT_ROOT: mlflow-artifacts:/
    volumes:
      - mlflow_data:/mlflow-artifacts
    depends_on:
      postgres:
        condition: service_healthy

  # ────────────────────────────────────────────────
  # 6. Prometheus  (metrics collection)
  # ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - stream-consumer

  # ────────────────────────────────────────────────
  # 7. Grafana  (dashboards)
  # ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fraud_detection.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redpanda_data:
  postgres_data:
  mlflow_data:
  grafana_data:
